<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document PDF Generator</title>
    <!-- Load the stable PDF-Lib library -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 40px; background-color: #f4f7f6; display: flex; justify-content: center; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; font-size: 22px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>PDF Template Filler</h2>
    
    <div class="input-group">
        <label for="userName">Full Name</label>
        <input type="text" id="userName" placeholder="Enter full name">
    </div>
    
    <div class="input-group">
        <label for="currentDate">Date</label>
        <input type="text" id="currentDate" placeholder="YYYY-MM-DD">
    </div>

    <button onclick="generatePDF()">Fill PDF Template</button>
</div>

<script>
    async function generatePDF() {
        const nameValue = document.getElementById('userName').value;
        const dateValue = document.getElementById('currentDate').value;

        if (!nameValue || !dateValue) {
            alert('Please fill out both fields.');
            return;
        }

        try {
            // 1. Fetch your original uploaded PDF template file
            const response = await fetch('./template.pdf');
            if (!response.ok) {
                throw new Error('Could not find template.pdf in your repository folder.');
            }
            const existingPdfBytes = await response.arrayBuffer();

            // 2. Load it into the PDF processing module
            const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0]; // Selects page 1

            // 3. Stamp your input values directly onto your template coordinate grid
            // Note: x increases to the right, y increases upward from the bottom edge
            firstPage.drawText(nameValue, { x: 150, y: 550, size: 14 });
            firstPage.drawText(dateValue, { x: 150, y: 500, size: 14 });

            // 4. Export and package the edited document
            const pdfBytes = await pdfDoc.save();

            // 5. Trigger an immediate browser file download
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = "Filled_Template_Form.pdf";
            link.click();

        } catch (error) {
            console.error(error);
            alert('Error mapping template: ' + error.message);
        }
    }
</script>

</body>
</html>
