<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document PDF Generator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 40px; background-color: #f4f7f6; display: flex; justify-content: center; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #333; font-size: 22px; text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>PDF Text Filler</h2>
    
    <div class="input-group">
        <label for="userName">Full Name</label>
        <input type="text" id="userName" placeholder="Enter full name">
    </div>
    
    <div class="input-group">
        <label for="currentDate">Date</label>
        <input type="text" id="currentDate" placeholder="YYYY-MM-DD">
    </div>

    <button onclick="generatePDF()">Generate & Download</button>
</div>

<script>
    function generatePDF() {
        const nameValue = document.getElementById('userName').value;
        const dateValue = document.getElementById('currentDate').value;

        if (!nameValue || !dateValue) {
            alert('Please fill out both fields.');
            return;
        }

        // Open a clean blank pop-up window
        const printWindow = window.open('', '_blank');
        
        // Build a clean, styled sheet layout using your text inputs
        printWindow.document.write(`
            <html>
            <head>
                <title>Completed Form</title>
                <style>
                    body { font-family: Arial, sans-serif; padding: 50px; line-height: 2; }
                    h1 { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 30px; }
                    .info { font-size: 20px; margin-bottom: 15px; }
                    strong { color: #555; display: inline-block; width: 150px; }
                </style>
            </head>
            <body>
                <h1>Submitted Document Profile</h1>
                <div class="info"><strong>Full Name:</strong> \${nameValue}</div>
                <div class="info"><strong>Date:</strong> \${dateValue}</div>
                <script>
                    // Trigger the system print dialog instantly
                    window.onload = function() {
                        window.print();
                        window.close();
                    }
                <\/script>
            </body>
            </html>
        `);
        printWindow.document.close();
    }
</script>

</body>
</html>
